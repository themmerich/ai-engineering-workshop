<div class="flex flex-col gap-6">
  <div class="flex flex-col gap-1">
    <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-0">Trainingsgeräte</h1>
    <p class="text-surface-600 dark:text-surface-300">Übersicht der vorhandenen Trainingsgeräte.</p>
  </div>

  <div
    class="rounded-xl overflow-hidden border backdrop-blur-lg bg-white/70 dark:bg-surface-900/70 border-white/30 dark:border-surface-700/30"
  >
    <p-table
      #dt
      [value]="equipment()"
      dataKey="id"
      [tableStyle]="{ 'min-width': '40rem' }"
      [globalFilterFields]="['name']"
    >
      <ng-template pTemplate="caption">
        <div class="flex items-center gap-4">
          <div class="flex-1"></div>
          <p-iconfield iconPosition="left">
            <p-inputicon class="pi pi-search" />
            <input
              pInputText
              type="text"
              placeholder="Suchen…"
              (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            />
          </p-iconfield>
          <div class="flex-1 flex justify-end">
            <p-button label="Neu" icon="pi pi-plus" (onClick)="openNew()" />
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">
            <div class="flex items-center gap-1">
              Name
              <p-sortIcon field="name" />
              <p-columnFilter type="text" field="name" display="menu" />
            </div>
          </th>
          <th pSortableColumn="weight">
            <div class="flex items-center justify-end gap-1">
              Gewicht
              <p-sortIcon field="weight" />
              <p-columnFilter type="numeric" field="weight" display="menu" />
            </div>
          </th>
          <th pSortableColumn="purchaseDate">
            <div class="flex items-center gap-1">
              Kaufdatum
              <p-sortIcon field="purchaseDate" />
              <p-columnFilter type="date" field="purchaseDate" display="menu" />
            </div>
          </th>
          <th pSortableColumn="price">
            <div class="flex items-center justify-end gap-1">
              Preis
              <p-sortIcon field="price" />
              <p-columnFilter type="numeric" field="price" display="menu" />
            </div>
          </th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr>
          <td class="font-medium">{{ item.name }}</td>
          <td class="text-right">{{ formatWeight(item.weight) }}</td>
          <td>{{ item.purchaseDate | date: 'dd.MM.yyyy' }}</td>
          <td class="text-right">{{ formatPrice(item.price) }}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center text-surface-500 dark:text-surface-400 py-6">
            Keine Trainingsgeräte gefunden.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog
  header="Neues Trainingsgerät"
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [modal]="true"
  [style]="{ width: '32rem' }"
  [draggable]="false"
>
  <div class="flex flex-col gap-4 pt-2">
    <div class="flex flex-col gap-1">
      <label for="name" class="text-sm font-medium text-surface-700 dark:text-surface-200"
        >Name</label
      >
      <input id="name" pInputText [(ngModel)]="draft.name" autocomplete="off" />
    </div>

    <div class="flex flex-col gap-1">
      <label for="weight" class="text-sm font-medium text-surface-700 dark:text-surface-200"
        >Gewicht
        <span class="font-normal text-surface-500 dark:text-surface-400"
          >(nur bei Hanteln)</span
        ></label
      >
      <p-inputNumber
        inputId="weight"
        [(ngModel)]="draft.weight"
        suffix=" kg"
        [min]="0"
        [maxFractionDigits]="2"
        locale="de-DE"
        placeholder="—"
        styleClass="w-full"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="price" class="text-sm font-medium text-surface-700 dark:text-surface-200"
        >Preis</label
      >
      <p-inputNumber
        inputId="price"
        [(ngModel)]="draft.price"
        mode="currency"
        currency="EUR"
        locale="de-DE"
        [min]="0"
        styleClass="w-full"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="purchaseDate" class="text-sm font-medium text-surface-700 dark:text-surface-200"
        >Kaufdatum</label
      >
      <p-datepicker
        inputId="purchaseDate"
        [(ngModel)]="draft.purchaseDate"
        dateFormat="dd.mm.yy"
        [showIcon]="true"
        [maxDate]="today"
        styleClass="w-full"
      />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Abbrechen"
      severity="secondary"
      [text]="true"
      (onClick)="dialogVisible.set(false)"
    />
    <p-button
      label="Speichern"
      icon="pi pi-check"
      [disabled]="!draft.name.trim() || draft.price === null || draft.purchaseDate === null"
      (onClick)="save()"
    />
  </ng-template>
</p-dialog>
