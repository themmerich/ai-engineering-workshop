<div class="demo">
  <p-card
    header="PrimeNG Demo"
    subheader="Wenn diese Karte gestylt aussieht, läuft PrimeNG korrekt."
  >
    <div class="demo__section">
      <label class="demo__label" for="nameInput">Dein Name</label>
      <input
        id="nameInput"
        pInputText
        type="text"
        placeholder="z. B. Thomas"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
      />
      <p class="demo__greeting">{{ greeting() }}</p>
    </div>

    <div class="demo__section">
      <div class="demo__counter">
        <span>Zähler:</span>
        <p-tag [value]="count().toString()" [severity]="countSeverity()" />
      </div>
      <div class="demo__buttons">
        <p-button label="Minus" icon="pi pi-minus" severity="secondary" (onClick)="decrement()" />
        <p-button label="Plus" icon="pi pi-plus" (onClick)="increment()" />
        <p-button label="Reset" icon="pi pi-refresh" [outlined]="true" (onClick)="reset()" />
      </div>
    </div>
  </p-card>
</div>
